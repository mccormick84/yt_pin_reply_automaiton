name: YouTube 고정 댓글 자동화

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  pin-comment:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 인증 파일 복원
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.GMAIL_TOKEN }}'           > gmail_token.json
          echo '${{ secrets.YOUTUBE_TOKEN }}'         > youtube_token.json

      - name: 스크립트 실행
        run: python yt_pin.py

      - name: 갱신된 토큰을 Secrets에 업데이트
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f gmail_token.json ]; then
            gh secret set GMAIL_TOKEN --body "$(cat gmail_token.json)" --repo ${{ github.repository }}
            echo "GMAIL_TOKEN 업데이트 완료"
          fi
          if [ -f youtube_token.json ]; then
            gh secret set YOUTUBE_TOKEN --body "$(cat youtube_token.json)" --repo ${{ github.repository }}
            echo "YOUTUBE_TOKEN 업데이트 완료"
          fi
