name: YouTube 고정 댓글 자동화

on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "5 9 * * *"
    - cron: "30 9 * * *"
    - cron: "35 9 * * *"
  workflow_dispatch:

jobs:
  pin-comment:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 인증 파일 복원
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.GMAIL_TOKEN }}'   | base64 -d > gmail_token.json
          echo '${{ secrets.YOUTUBE_TOKEN }}'  | base64 -d > youtube_token.json
          echo '${{ secrets.MONITOR_CONFIG }}' | base64 -d > monitor_config.json

      - name: 새 영상 감지 및 노션/이메일 알림
        env:
          LAST_VIDEO_ID: ${{ secrets.LAST_VIDEO_ID }}
        run: python yt_monitor.py

      - name: LAST_VIDEO_ID 업데이트
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f last_video_id.txt ]; then
            gh secret set LAST_VIDEO_ID --body "$(cat last_video_id.txt)" --repo ${{ github.repository }}
            echo "LAST_VIDEO_ID 업데이트 완료"
          fi

      - name: 이메일 수신 대기 (30초)
        run: sleep 30

      - name: 고정 댓글 추가
        run: python yt_pin.py

      - name: 갱신된 토큰을 Secrets에 업데이트
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f gmail_token.json ]; then
            gh secret set GMAIL_TOKEN --body "$(base64 < gmail_token.json | tr -d '\n')" --repo ${{ github.repository }}
            echo "GMAIL_TOKEN 업데이트 완료"
          fi
          if [ -f youtube_token.json ]; then
            gh secret set YOUTUBE_TOKEN --body "$(base64 < youtube_token.json | tr -d '\n')" --repo ${{ github.repository }}
            echo "YOUTUBE_TOKEN 업데이트 완료"
          fi
