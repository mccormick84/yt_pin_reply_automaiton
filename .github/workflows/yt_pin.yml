name: YouTube 고정 댓글 자동화

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:  # 수동 실행 가능

jobs:
  pin-comment:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 인증 파일 복원
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN }}'         > token.json

      - name: 스크립트 실행
        run: python yt_pin.py

      - name: 갱신된 token.json을 Secrets에 업데이트
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f token.json ]; then
            TOKEN_VALUE=$(cat token.json)
            gh secret set YOUTUBE_TOKEN --body "$TOKEN_VALUE" --repo ${{ github.repository }}
            echo "token.json Secrets 업데이트 완료"
          fi
